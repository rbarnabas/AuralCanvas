name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.platform }} (${{ matrix.arch }}) installer
        run: npm run build:${{ matrix.platform }} -- --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: aural-canvas-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  release:
    if: always() && startsWith(github.ref, 'refs/tags/v') && !cancelled() && contains(fromJSON('["success","failure"]'), needs.build.result)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aural Canvas ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/**
          generate_release_notes: true
          body: |
            ## Install Aural Canvas

            ### macOS
            1. Download `Aural Canvas-*-mac-arm64.dmg` (Apple Silicon) or `*-mac-x64.dmg` (Intel)
            2. Open the `.dmg` file
            3. Drag **Aural Canvas** into **Applications**
            4. Launch from Applications (right-click → Open the first time if macOS blocks it)

            ### Windows
            1. Download `Aural Canvas-*-win-x64.exe`
            2. Run the installer and follow the prompts
            3. Launch **Aural Canvas** from the Start menu or desktop shortcut

            No Node.js or other setup required — these are standalone desktop apps.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
